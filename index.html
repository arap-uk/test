<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | VORG GLOBAL</title>
    <link rel="stylesheet" href="panel-style.css">
</head>
<body>
    <div id="loadingOverlay">
        <img src="https://i.gifer.com/ZZ5H.gif" width="60">
        <p>در حال دریافت امن اطلاعات پرونده...</p>
    </div>

    <div class="panel-layout" id="panelUI" style="display:none;">
        <aside class="sidebar">
            <div class="brand">
                <img src="https://cdn-icons-png.flaticon.com/512/984/984233.png" class="airplane-icon">
                <h2>VORG PANEL</h2>
            </div>
            <div class="user-info">
                <p id="userNameDisplay">...</p>
                <span id="caseIdDisplay">...</span>
            </div>
            <button onclick="logout()" class="btn-logout">خروج از سیستم</button>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>پنل رسمی مدیریت کیس</h1>
            </header>

            <div class="grid-container">
                <section class="info-card">
                    <h3>👤 مشخصات فردی متقاضی</h3>
                    <div id="personalData" class="data-list"></div>
                </section>

                <section class="info-card">
                    <h3>⚖️ وضعیت پرونده و وکیل</h3>
                    <div id="legalData" class="data-list"></div>
                </section>

                <section class="info-card full-width">
                    <h3>📂 اسناد و مدارک آنلاین (Google Drive)</h3>
                    <div id="docsContainer" class="docs-grid"></div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "لینک_اسکریپت_شما"; // آدرس نهایی اسکریپت گوگل را اینجا بگذارید

        window.onload = function() {
            const caseNum = localStorage.getItem('userCaseNumber');
            if (!caseNum) { window.location.href = "index.html"; return; }

            fetch(`${API_URL}?action=getPanelData&caseNumber=${caseNum}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('loadingOverlay').style.display = 'none';
                    if (data.success) {
                        document.getElementById('panelUI').style.display = 'flex';
                        populateData(data);
                    } else {
                        alert("دسترسی غیرمجاز!");
                        logout();
                    }
                })
                .catch(() => alert("خطا در ارتباط با سرور دیتابیس"));
        };

        function populateData(data) {
            const p = data.personal;
            const d = data.docs;

            document.getElementById('userNameDisplay').innerText = p[0] + " " + p[1];
            document.getElementById('caseIdDisplay').innerText = "ID: " + p[20];

            // مشخصات فردی (A-K)
            document.getElementById('personalData').innerHTML = `
                <div class="row"><span>نام:</span> <strong>${p[0]}</strong></div>
                <div class="row"><span>تخلص:</span> <strong>${p[1]}</strong></div>
                <div class="row"><span>نام پدر:</span> <strong>${p[2]}</strong></div>
                <div class="row"><span>نمبر تذکره:</span> <strong>${p[8]}</strong></div>
                <div class="row"><span>ملیت:</span> <strong>${p[4]}</strong></div>
            `;

            // وضعیت حقوقی (Q-W)
            document.getElementById('legalData').innerHTML = `
                <div class="row"><span>کشور مقصد:</span> <strong>${p[17]}</strong></div>
                <div class="row"><span>وکیل مسئول:</span> <strong>${p[22]}</strong></div>
                <div class="row"><span>سریال پیگیری:</span> <strong style="color:blue">${p[20]}</strong></div>
                <div class="row"><span>وضعیت پرداخت:</span> <strong class="badge">${p[21]}</strong></div>
            `;

            // مدارک Docpic (لینک‌ها)
            const labels = ["تصویر شخصی", "اپلیکیشن فورم", "قبولی IOM", "قبولی UN", "مصاحبه", "رسید پرداخت", "مدارک وظیفه", "وزارت خارجه", "کیس ورکر", "نامه HR", "توصیه نامه", "قرارداد وکالت", "مشخصات وکیل", "حمایت ویزا", "خطر جانی", "شاهدان", "همکاری", "تصویر ۱", "تصویر ۲", "فامیل"];
            let html = "";
            for(let i=0; i<labels.length; i++) {
                if(d[i] && d[i].toString().includes("http")) {
                    html += `
                        <a href="${d[i]}" target="_blank" class="doc-item">
                            <div class="doc-icon">📂</div>
                            <div class="doc-name">${labels[i]}</div>
                        </a>`;
                }
            }
            document.getElementById('docsContainer').innerHTML = html || "<p>مدرکی آپلود نشده است.</p>";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
