<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل کاربری | VORG GLOBAL</title>
    <style>
        :root { --primary: #0d47a1; --bg: #f4f7f6; }
        body { font-family: Tahoma, sans-serif; background: var(--bg); margin: 0; direction: rtl; }
        
        .header { 
            background: var(--primary); 
            color: white; 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .container { 
            width: 95%; 
            max-width: 1200px; 
            margin: 20px auto; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }

        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }

        .full { grid-column: span 2; }

        h3 { 
            margin-top: 0; 
            color: var(--primary); 
            border-bottom: 2px solid #eee; 
            padding-bottom: 10px;
            font-size: 18px;
        }

        .data-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0; 
            border-bottom: 1px solid #f9f9f9; 
        }

        .data-row span { color: #666; font-size: 14px; }
        .data-row b { color: #333; font-size: 15px; }

        .docs-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; 
            margin-top: 15px;
        }

        .doc-link { 
            display: block; 
            padding: 12px; 
            background: #fff; 
            border: 1px solid #e0e0e0;
            text-decoration: none; 
            color: #333; 
            text-align: center; 
            border-radius: 8px; 
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .doc-link:hover { 
            background: #e3f2fd; 
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .logout { 
            background: #d32f2f; 
            color: white; 
            border: none; 
            padding: 8px 20px; 
            cursor: pointer; 
            border-radius: 6px;
            font-weight: bold;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            background: #e8f5e9;
            color: #2e7d32;
        }

        #loader { 
            position: fixed; 
            top:0; left:0; 
            width:100%; height:100%; 
            background:white; 
            display:flex; 
            justify-content:center; 
            align-items:center; 
            z-index:999; 
        }

        @media (max-width: 800px) {
            .container { grid-template-columns: 1fr; }
            .full { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div id="loader"><img src="https://i.gifer.com/ZZ5H.gif" width="50"></div>

    <div class="header">
        <div>پنل مدیریت پرونده‌های VORG GLOBAL</div>
        <button class="logout" onclick="logout()">خروج از سیستم</button>
    </div>

    <div class="container">
        <div class="card">
            <h3>👤 اطلاعات پایه و هویتی</h3>
            <div id="personalData"></div>
        </div>

        <div class="card">
            <h3>🆔 مدارک شناسایی و تماس</h3>
            <div id="identityData"></div>
        </div>

        <div class="card full">
            <h3>⚖️ وضعیت حقوقی و جزئیات پرونده</h3>
            <div id="legalData" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0 40px;"></div>
        </div>

        <div class="card full">
            <h3>📂 آرشیو اسناد و مدارک دیجیتال (Google Drive)</h3>
            <div id="dData" class="docs-grid"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyjvuEm6Trv1SokGDrPUQK9dPJoDnzlTVvORxTYB9mgnomGcxdJgLadFSwGaz6EoDesoA/exec";
        
        window.onload = () => {
            const caseNum = localStorage.getItem('userCaseNumber');
            if(!caseNum) return window.location.href = "index.html";

            fetch(`${API_URL}?action=getPanelData&caseNumber=${caseNum}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('loader').style.display = 'none';
                    if(data.success) {
                        const p = data.personal; // ردیف دیتا از A تا Z
                        
                        // ۱. نمایش اطلاعات پایه (A-F)
                        document.getElementById('personalData').innerHTML = `
                            <div class="data-row"><span>نام:</span> <b>${p[0] || '---'}</b></div>
                            <div class="data-row"><span>تخلص:</span> <b>${p[1] || '---'}</b></div>
                            <div class="data-row"><span>نام پدر:</span> <b>${p[2] || '---'}</b></div>
                            <div class="data-row"><span>شماره کیس:</span> <b style="color:blue">${p[3] || '---'}</b></div>
                            <div class="data-row"><span>تاریخ تولد:</span> <b>${p[4] || '---'}</b></div>
                            <div class="data-row"><span>محل تولد:</span> <b>${p[5] || '---'}</b></div>
                        `;

                        // ۲. نمایش مدارک و تماس (G-P)
                        document.getElementById('identityData').innerHTML = `
                            <div class="data-row"><span>نمبر پاسپورت:</span> <b>${p[6] || '---'}</b></div>
                            <div class="data-row"><span>نمبر تذکره:</span> <b>${p[7] || '---'}</b></div>
                            <div class="data-row"><span> :</span> <b>${p[8] || '---'}</b></div>
                            <div class="data-row"><span>نمبر تذکره:</span> <b>${p[9] || '---'}</b></div>
                            <div class="data-row"><span>شماره تماس:</span> <b dir="ltr">${p[10] || '---'}</b></div>
                            <div class="data-row"><span>ایمیل:</span> <b>${p[11] || '---'}</b></div>
                            <div class="data-row"><span>آدرس فعلی:</span> <b>${p[12] || '---'}</b></div>
                        `;

                        // ۳. وضعیت حقوقی (Q-Z)
                        document.getElementById('legalData').innerHTML = `
                            <div class="data-row"><span>کشور مقصد:</span> <b>${p[17] || '---'}</b></div>
                            <div class="data-row"><span>وضعیت فعلی:</span> <b class="status-badge">${p[18] || 'در جریان'}</b></div>
                            <div class="data-row"><span>نوع کیس:</span> <b>${p[19] || '---'}</b></div>
                            <div class="data-row"><span>تاریخ ثبت:</span> <b>${p[20] || '---'}</b></div>
                            <div class="data-row"><span>وضعیت مالی:</span> <b>${p[21] || '---'}</b></div>
                            <div class="data-row"><span>وکیل مسئول:</span> <b style="color:var(--primary)">${p[22] || '---'}</b></div>
                            <div class="data-row"><span>توضیحات:</span> <b>${p[23] || '---'}</b></div>
                            <div class="data-row"><span>آخرین آپدیت:</span> <b>${p[24] || '---'}</b></div>
                        `;
                        
                        // ۴. نمایش لینک‌های مدارک (Docpic)
                        let dHtml = "";
                        const labels = ["عکس پرسونل", "اسکن پاسپورت", "اسکن تذکره", "سند قبولی", "فورم درخواستی", "نتیجه مصاحبه", "رسید بانکی", "اسناد وظیفه", "تائیدیه وزارت", "نامه وکیل"];
                        
                        if(data.docs) {
                            data.docs.forEach((link, i) => {
                                if(link && link.toString().includes("http")) {
                                    dHtml += `<a href="${link}" target="_blank" class="doc-link">📁 ${labels[i] || 'سند شماره ' + (i+1)}</a>`;
                                }
                            });
                        }
                        document.getElementById('dData').innerHTML = dHtml || "<p style='grid-column:1/-1; text-align:center; color:#999;'>هیچ مدرکی یافت نشد.</p>";
                    } else {
                        alert("خطا در دریافت اطلاعات. لطفا دوباره لاگین کنید.");
                        logout();
                    }
                })
                .catch(err => {
                    alert("خطای سرور! اتصال اینترنت خود را چک کنید.");
                    console.error(err);
                });
        };

        function logout() { 
            localStorage.clear(); 
            window.location.href = "index.html"; 
        }
    </script>
</body>
</html>
